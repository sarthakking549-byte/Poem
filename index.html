<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kavita - Phone Poetry Portal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,500;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #f59e0b;
            --accent-hover: #d97706;
            --border: #334155;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            line-height: 1.5;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
            max-width: 400px;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        main {
            width: 100%;
            max-width: 440px;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.75rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }

        h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-main);
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.75rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Custom style blueprint for native mobile file uploader */
        input[type="file"] {
            width: 100%;
            padding: 0.5rem;
            background-color: rgba(245, 158, 11, 0.05);
            border: 1px dashed var(--accent);
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
        }

        input[type="file"]::file-selector-button {
            background-color: var(--accent);
            color: var(--bg-color);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            margin-right: 1rem;
            cursor: pointer;
            font-size: 0.85rem;
        }

        textarea {
            resize: vertical;
            font-family: 'Playfair Display', serif;
        }

        /* Real-time preview module style */
        .preview-box {
            display: none;
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            max-height: 200px;
            overflow-y: auto;
        }

        .preview-box h4 {
            font-size: 0.8rem;
            color: var(--success);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }

        .preview-box pre {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            white-space: pre-wrap;
            font-size: 1rem;
            color: #e2e8f0;
        }

        button[type="submit"] {
            width: 100%;
            background-color: var(--accent);
            color: var(--bg-color);
            border: none;
            padding: 0.85rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 0.5rem;
        }

        button[type="submit"]:hover {
            background-color: var(--accent-hover);
        }

        button[type="submit"]:active {
            transform: scale(0.98);
        }

        footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <header>
        <h1>Kavita</h1>
        <p>A minimalist sanctuary to publish your stanzas instantly from your phone storage</p>
    </header>

    <main>
        <form action= https://fonts.googleapis.com method="POST" enctype="multipart/form-data" id="poetryForm">
            
            <h3>Submit Your Poem</h3>

            <div class="form-group">
                <label for="poet-name">Your Name / Pen Name</label>
                <input type="text" id="poet-name" name="poet_name" placeholder="e.g., John Doe" required>
            </div>

            <div class="form-group">
                <label for="poem-title">Poem Title</label>
                <input type="text" id="poem-title" name="poem_title" placeholder="e.g., Autumn Whispers" required>
            </div>

            <div class="form-group">
                <label for="poem-file">Upload Poem File (.txt)</label>
                <input type="file" id="poem-file" name="poem_file" accept=".txt">
            </div>

            <div class="form-group">
                <label for="poem-backup">Or type/paste your poem here</label>
                <input type="hidden" id="hiddenPoemContent" name="uploaded_poem_content">
                <textarea id="poem-backup" name="poem_text" rows="6" placeholder="Write your heart out here..."></textarea>
            </div>

            <div class="preview-box" id="filePreviewContainer">
                <h4>✓ File Loaded Successfully</h4>
                <pre id="fileContentDisplay"></pre>
            </div>

            <button type="submit">Publish Poem</button>
        </form>
    </main>

    <footer>
        <p>Created entirely on mobile using GitHub.</p>
    </footer>

    <script>
        const fileInput = document.getElementById('poem-file');
        const previewContainer = document.getElementById('filePreviewContainer');
        const displayArea = document.getElementById('fileContentDisplay');
        const form = document.getElementById('poetryForm');
        const textBackup = document.getElementById('poem-backup');
        const hiddenContent = document.getElementById('hiddenPoemContent');

        // 1. Live File Reader Feature
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                const text = evt.target.result;
                displayArea.textContent = text;
                hiddenContent.value = text; // Safely copies file text to send via pure form layout
                previewContainer.style.display = 'block'; 
            };
            reader.readAsText(file);
        });

        // 2. Safe Submission Validator
        form.addEventListener('submit', function(e) {
            if (!fileInput.value && !textBackup.value.trim()) {
                e.preventDefault();
                alert('Please upload a .txt file OR type a poem in the textarea before publishing!');
            }
        });
    </script>
</body>
</html>
